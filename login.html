<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<style>
    * {
        box-sizing: border-box;
        font-family: sans-serif;
    }

    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f2f5;
    }
</style>

<body>
    <div class="container">
        <div class="BoxLogin"
            style="background-color: white; width: 400px; height: auto; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">

            <div style="display: flex; justify-content: center; margin-bottom: 10px;">
                <img src="https://placehold.co/80x80/28a745/white?text=Badminton" alt="App Logo"
                    style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
            </div>

            <h2 style="display: flex; justify-content: center; margin-bottom: 20px; color: #333; font-size: 22px;">Login
                to Badminton System</h2>

            <div class="email" style="display: flex; flex-direction: column; margin-bottom: 15px;">
                <label for="Email" style="padding-bottom: 5px; font-weight: bold;">Email :</label>
                <input type="email" placeholder="email@gmail.com"
                    style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>

            <div class="password" style="display: flex; flex-direction: column; margin-bottom: 20px;">
                <label for="password" style="padding-bottom: 5px; font-weight: bold;">Password :</label>
                <input type="password" placeholder="examxxxxx"
                    style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>

            <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">
                <button
                    style="display: flex; justify-content: center; align-items: center; width: 160px; height: 40px; background-color: #6e6e6e; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                    สมัครสมาชิก
                </button>
                <button class="btn"
                    style="display: flex; justify-content: center; align-items: center; width: 160px; height: 40px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                    ลงชื่อเข้าใช้
                </button>
            </div>

            <div style="display: flex; align-items: center; margin: 25px 0 15px 0;">
                <div style="flex: 1; height: 1px; background-color: #ccc;"></div>
                <span style="padding: 0 10px; color: #777; font-size: 14px;">หรือล็อกอินด้วย</span>
                <div style="flex: 1; height: 1px; background-color: #ccc;"></div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">

                <button
                    style="display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; height: 40px; background-color: #ffffff; color: #757575; border: 1px solid #ddd; border-radius: 5px; font-weight: bold; cursor: pointer;">
                    <i class="fa-brands fa-google" style="color: #EA4335; font-size: 18px;"></i>
                    Continue with Google
                </button>

                <button
                    style="display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; height: 40px; background-color: #06C755; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                    <i class="fa-brands fa-line" style="font-size: 20px;"></i>
                    Continue with Line
                </button>

                <button
                    style="display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; height: 40px; background-color: #1877F2; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                    <i class="fa-brands fa-facebook" style="font-size: 20px;"></i>
                    Continue with Facebook
                </button>
            </div>

        </div>
    </div>
</body>

</html>
